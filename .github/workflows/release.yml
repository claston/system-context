name: Release | Versioned Publish

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version in semantic format (example: v1.2.3)"
        required: true
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: sqlite+pysqlite:///./ci.db

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Resolve release version
        id: version
        shell: bash
        run: |
          set -euo pipefail

          if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
            release_version="${GITHUB_REF_NAME}"
          else
            release_version="${{ inputs.version }}"
          fi

          if [[ ! "${release_version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Release version must match v<major>.<minor>.<patch>."
            exit 1
          fi

          echo "release_version=${release_version}" >> "${GITHUB_OUTPUT}"
          echo "RELEASE_VERSION=${release_version}" >> "${GITHUB_ENV}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Lint (Ruff)
        run: ruff check .

      - name: Run unit tests
        run: pytest -q

      - name: Run MCP smoke checks
        run: python scripts/mcp_smoke_check.py

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_RELEASE=${{ env.RELEASE_VERSION }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/system-context:${{ env.RELEASE_VERSION }}
            ghcr.io/${{ github.repository_owner }}/system-context:${{ github.sha }}
          labels: |
            org.opencontainers.image.version=${{ env.RELEASE_VERSION }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_VERSION }}
          name: ${{ env.RELEASE_VERSION }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
