name: CD | Publish Container (GHCR)

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: publish-ghcr-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  publish-image:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            APP_RELEASE=staging-${{ github.sha }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/system-context:staging
            ghcr.io/${{ github.repository_owner }}/system-context:${{ github.sha }}
