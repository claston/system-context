name: Deploy Staging

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  deploy-staging:
    runs-on: ubuntu-latest
    environment: staging
    env:
      DATABASE_URL: ${{ secrets.STAGING_DATABASE_URL }}
      MCP_API_TOKEN: ${{ secrets.STAGING_MCP_API_TOKEN }}
      GITHUB_TOKEN: ${{ secrets.STAGING_GITHUB_TOKEN }}
      GITHUB_OWNER: ${{ vars.STAGING_GITHUB_OWNER }}
      GITHUB_REPOS: ${{ vars.STAGING_GITHUB_REPOS }}
      GITHUB_PER_PAGE: "20"
      GITHUB_MAX_PAGES: "10"
      GITHUB_SYNC_LOOKBACK_MINUTES: "60"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate migration state and schema
        run: python scripts/validate_environment.py

      - name: Run unit tests
        run: pytest -q

      - name: Run MCP smoke checks
        run: python scripts/mcp_smoke_check.py
