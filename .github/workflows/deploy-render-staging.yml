name: Deploy Render Staging

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Deploy Staging
    types:
      - completed

permissions:
  contents: read

jobs:
  deploy-render-staging:
    if: ${{ vars.RENDER_DEPLOY_ENABLED == 'true' && (github.event_name == 'workflow_dispatch' || (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')) }}
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Trigger deploy on Render
        env:
          RENDER_API_KEY: ${{ secrets.RENDER_API_KEY }}
          RENDER_SERVICE_ID: ${{ secrets.RENDER_STAGING_SERVICE_ID }}
        run: |
          set -euo pipefail

          if [ -z "${RENDER_API_KEY:-}" ] || [ -z "${RENDER_SERVICE_ID:-}" ]; then
            echo "::notice::Skipping Render deploy because RENDER_API_KEY or RENDER_STAGING_SERVICE_ID is not configured."
            exit 0
          fi

          response_file=$(mktemp)

          curl -fsS -X POST "https://api.render.com/v1/services/${RENDER_SERVICE_ID}/deploys" \
            -H "Authorization: Bearer ${RENDER_API_KEY}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache":"do_not_clear"}' \
            -o "${response_file}"

          export RESPONSE_FILE="${response_file}"
